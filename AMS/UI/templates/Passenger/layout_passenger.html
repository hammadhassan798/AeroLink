<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Passenger | AeroLink{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex flex-col min-h-screen">

<header class="bg-gradient-to-r from-blue-700 to-indigo-700 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <img src="{{ url_for('static', filename='Images/logo.png') }}"
           class="h-11 w-11 rounded-xl shadow-md bg-white p-1" />
      <div class="flex flex-col leading-none">
        <h1 class="text-xl font-extrabold tracking-wide">AeroLink</h1>
        <span class="text-blue-200 text-xs tracking-wide">
          Passenger Portal
        </span>
      </div>
    </div>

    <nav class="hidden md:flex items-center gap-4 text-sm">
      <a href="{{ url_for('passenger.dashboard') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        Dashboard
      </a>

      <a href="{{ url_for('passenger.passenger_flights') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        Flights
      </a>

      <a href="{{ url_for('passenger.passenger_bookings') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        My Tickets
      </a>

      <a href="{{ url_for('auth.signup') }}"
         class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition">
        Logout
      </a>
    </nav>

    <button onclick="toggleMenu()"
            class="md:hidden p-2 rounded-lg hover:bg-white/20 transition">
      ☰
    </button>
  </div>

  <div id="mobileMenu"
       class="hidden md:hidden bg-blue-800 border-t border-white/20">
    <nav class="flex flex-col px-6 py-4 space-y-2 text-sm">

      <a href="{{ url_for('passenger.dashboard') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        Dashboard
      </a>

      <a href="{{ url_for('passenger.passenger_flights') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        Flights
      </a>

      <a href="{{ url_for('passenger.passenger_bookings') }}"
         class="hover:bg-white/20 px-3 py-2 rounded-lg transition">
        My Tickets
      </a>

      <a href="{{ url_for('auth.signup') }}"
         class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg transition text-center">
        Logout
      </a>
    </nav>
  </div>
</header>

<main class="flex-grow max-w-7xl mx-auto w-full px-6 py-8">
  {% block content %}{% endblock %}
</main>

<footer class="mt-auto bg-slate-900 text-slate-400 py-5">
  <div class="max-w-7xl mx-auto px-6 text-center">
    <p class="text-sm tracking-wide">
      © 2024–2028 <span class="text-white font-semibold">AeroLink</span>
      <span class="mx-2">•</span> Smart Flight Network
    </p>
    <p class="text-xs text-slate-500 mt-1">
      Passenger Experience Platform
    </p>
  </div>
</footer>

<script>
  function toggleMenu() 
  {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("hidden");
  }
</script>

</body>
</html>
